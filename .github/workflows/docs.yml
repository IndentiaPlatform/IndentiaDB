name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zensical
        run: |
          git clone https://github.com/zensical/zensical.git /tmp/zensical
          cd /tmp/zensical && python scripts/prepare.py
          pip install /tmp/zensical

      - name: Deploy to GitHub Pages
        run: zensical gh-deploy --force
