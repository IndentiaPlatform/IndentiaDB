stages:
  - build
  - deploy

variables:
  QUAY_REGISTRY: "quay.lvm.local"
  QUAY_NAMESPACE: "lvmit"
  NEXUS_REGISTRY: "nexus.lvm.local:8082"
  IMAGE_NAME: "${QUAY_REGISTRY}/${QUAY_NAMESPACE}/indentiadb-docs"
  STORAGE_DRIVER: vfs
  GITOPS_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.lvm.local/indentia/indentia-gitops-htz.git"
  GITOPS_COMPONENT_PATH: "environments/lvms-indentia-prod-system/indentiadb-docs"

build:
  stage: build
  image: ${NEXUS_REGISTRY}/buildah/stable:latest
  variables:
    STORAGE_DRIVER: vfs
  before_script:
    - |
      AUTH_QUAY=$(echo -n "$QUAY_USERNAME:$QUAY_PASSWORD" | base64 -w0)
      AUTH_NEXUS=$(echo -n "$NEXUS_USERNAME:$NEXUS_PASSWORD" | base64 -w0)
      AUTHFILE="$HOME/.config/containers/auth.json"
      mkdir -p "$(dirname $AUTHFILE)"
      printf '{"auths":{"%s":{"auth":"%s"},"%s":{"auth":"%s"}}}' \
        "$QUAY_REGISTRY" "$AUTH_QUAY" \
        "$NEXUS_REGISTRY" "$AUTH_NEXUS" > "$AUTHFILE"
      POLICY="$HOME/policy.json"
      printf '{"default":[{"type":"insecureAcceptAnything"}]}' > "$POLICY"
  script:
    - |
      buildah bud \
        --storage-driver ${STORAGE_DRIVER} \
        --tls-verify=false \
        --signature-policy "$HOME/policy.json" \
        --layers \
        -f Containerfile \
        -t "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        -t "${IMAGE_NAME}:latest" \
        .
    - |
      buildah push \
        --storage-driver ${STORAGE_DRIVER} \
        --tls-verify=false \
        --signature-policy "$HOME/policy.json" \
        --authfile "$HOME/.config/containers/auth.json" \
        "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - |
      buildah push \
        --storage-driver ${STORAGE_DRIVER} \
        --tls-verify=false \
        --signature-policy "$HOME/policy.json" \
        --authfile "$HOME/.config/containers/auth.json" \
        "${IMAGE_NAME}:latest"
    - echo "IMAGE=${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" > image.env
  artifacts:
    reports:
      dotenv: image.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: ${NEXUS_REGISTRY}/bitnami/kubectl:latest
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@indentia.ai"
    - git config --global user.name "GitLab CI"
  script:
    - git clone ${GITOPS_REPO} gitops-htz
    - cd gitops-htz/indentia-gitops-htz/${GITOPS_COMPONENT_PATH}
    - |
      # Get full image digest from Quay
      DIGEST=$(buildah inspect --format '{{.FromImageDigest}}' ${IMAGE} 2>/dev/null || echo "")
      if [ -n "$DIGEST" ]; then
        IMAGE_WITH_DIGEST="${IMAGE_NAME}@${DIGEST}"
      else
        IMAGE_WITH_DIGEST="${IMAGE}"
      fi
    - |
      # Update image in kustomization.yaml
      sed -i "s|newTag:.*|newTag: ${CI_COMMIT_SHORT_SHA}|" kustomization.yaml
    - git add kustomization.yaml
    - git commit -m "chore: update indentiadb-docs to ${CI_COMMIT_SHORT_SHA} [skip ci]"
    - git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
