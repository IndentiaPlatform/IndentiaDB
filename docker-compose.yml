services:
  indentiadb:
    image: quay.io/indentia/indentiagraph:latest
    container_name: indentiadb
    restart: unless-stopped
    ports:
      - "7001:7001"
      - "9200:9200"
    environment:
      SURREAL_USER: root
      SURREAL_PASS: changeme
      ES_HYBRID_SCORER: rrf
      ES_VECTOR_SEARCH_MODE: hnsw
    volumes:
      - indentiadb-data:/data
      # Uncomment to mount a custom configuration file:
      # - ./indentiagraph.toml:/config/indentiagraph.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  indentiadb-data:
