# Theme
[project.theme]
variant = "classic"
logo = "assets/logo-horizontal.png"
favicon = "assets/logo-mark.png"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.top",
  "navigation.footer",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "search.highlight",
  "search.suggest",
  "search.share",
  "toc.follow",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"
# Display font (Space Grotesk) is loaded via stylesheets/indentia-tokens.css

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "cyan"
[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "cyan"
[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to dark mode"

# Extra
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/IndentiaPlatform/IndentiaDB"

[project.extra.version]
provider = "mike"

# Plugins
[project.plugins.search]
lang = "en"

# Markdown extensions
# Zensical includes all pymdownx.* extensions by default.
# Only overrides where config differs from defaults.
[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true
